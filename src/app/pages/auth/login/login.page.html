<ion-content [fullscreen]="true" class="login-content">

  <div class="hero-section">
    <div class="hero-logo">
      <ion-icon name="flash"></ion-icon>
      <span>SPEED</span>
    </div>
    <div class="hero-glow"></div>
    <img [src]="heroCarImage" class="hero-image" alt="Speed Fleet" />
  </div>

  <div class="sheet">
    <h2 class="sheet-title">تسجيل الدخول</h2>
    <p class="sheet-subtitle">سجّل دخولك وابدأ رحلتك</p>

    <ion-segment [(ngModel)]="loginType" mode="md" class="type-segment">
      <ion-segment-button value="email">
        <ion-icon name="mail-outline"></ion-icon>
        <ion-label>بريد إلكتروني</ion-label>
      </ion-segment-button>
      <ion-segment-button value="phone">
        <ion-icon name="phone-portrait-outline"></ion-icon>
        <ion-label>رقم الهاتف</ion-label>
      </ion-segment-button>
    </ion-segment>

    <div class="input-group" *ngIf="loginType === 'email'">
      <ion-icon name="mail-outline"></ion-icon>
      <ion-input [(ngModel)]="email" type="email" placeholder="البريد الإلكتروني" dir="ltr"></ion-input>
    </div>
    <div class="input-group" *ngIf="loginType === 'phone'">
      <ion-icon name="phone-portrait-outline"></ion-icon>
      <ion-input [(ngModel)]="phone" type="tel" placeholder="+973XXXXXXXX" dir="ltr"></ion-input>
    </div>

    <div class="input-group">
      <ion-icon name="lock-closed-outline"></ion-icon>
      <ion-input [(ngModel)]="password" [type]="showPassword ? 'text' : 'password'" placeholder="كلمة المرور" dir="ltr"></ion-input>
      <ion-icon [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" (click)="showPassword = !showPassword" class="eye-icon"></ion-icon>
    </div>

    <div class="forgot-link" (click)="goToForgot()">نسيت كلمة المرور؟</div>

    <ion-button expand="block" (click)="login()" [disabled]="loading" class="login-btn">
      <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
      <span *ngIf="!loading">تسجيل الدخول</span>
      <ion-icon *ngIf="!loading" name="arrow-forward-outline" slot="end"></ion-icon>
    </ion-button>

    <div class="divider"><span>OR</span></div>

    <button class="guest-btn" (click)="continueAsGuest()">
      <ion-icon name="person-outline"></ion-icon>
      <span>Continue as Guest</span>
    </button>

    <div class="register-link">
      ليس لديك حساب؟ <span (click)="goToRegister()">سجّل الآن</span>
    </div>
  </div>
</ion-content>
